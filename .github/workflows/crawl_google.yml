name: Google Crawl

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Notify start
        run: python notify.py "🔵 Google crawler spuštěn"
      - name: Count before
        id: before
        run: echo "count=$(python count_db.py google_suggestions)" >> $GITHUB_OUTPUT
      - name: Run crawler
        run: python crawler_google.py
      - name: Count after and notify
        if: always()
        run: |
          AFTER=$(python count_db.py google_suggestions)
          python notify_done.py google ${{ steps.before.outputs.count }} $AFTER
