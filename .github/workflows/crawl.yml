name: Auto Crawl

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HETZNER_WRITE_DATABASE_URL: ${{ secrets.HETZNER_WRITE_DATABASE_URL }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install "psycopg[binary]"
      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --accept-routes
      - name: Notify start
        if: false  # per-run Telegram notifikace vypnuty
        run: python notify.py "🔴 Seznam crawler spuštěn"
        continue-on-error: true
      - name: Count before
        id: before
        run: |
          COUNT=$(python count_db.py suggestions)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          python save_count.py crawl_state count_before $COUNT
        continue-on-error: true
      - name: Run crawler
        run: python crawler_auto.py
      - name: Count after and notify
        if: always()
        run: |
          AFTER=$(python count_db.py suggestions)
          python save_count.py crawl_state count_after $AFTER
          # python notify_done.py seznam ${{ steps.before.outputs.count }} $AFTER  # per-run Telegram notifikace vypnuty
        continue-on-error: true
