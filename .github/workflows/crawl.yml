name: Auto Crawl

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Notify start
        run: python notify.py "🔴 Seznam crawler spuštěn"
      - name: Count before
        id: before
        run: |
          COUNT=$(python count_db.py suggestions)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          python save_count.py crawl_state count_before $COUNT
      - name: Run crawler
        run: python crawler_auto.py
      - name: Count after and notify
        if: always()
        run: |
          AFTER=$(python count_db.py suggestions)
          python save_count.py crawl_state count_after $AFTER
          python notify_done.py seznam ${{ steps.before.outputs.count }} $AFTER
