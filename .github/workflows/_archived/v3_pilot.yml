name: v3 Pilot Crawl -- seed-only clean sber

# Vylucne manualni spusteni (workflow_dispatch).
# Zadny schedule, zadny pg_cron trigger, zadne automaticke probuzeni.
# Prvni spusteni: dry_run=true (default). Ostry beh az po overeni dry runu.
#
# Stop logika pilotu:
#   1. GitHub Actions cancel (primarne)
#   2. input abort=true
#   3. env V3_PILOT_ABORT=true (nastavuje workflow z inputs.abort)
#
# Skript se NEDOTYKA: crawler_control, google_crawler_state, google_suggestions_v2.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = jen IP check pro 7 trhu, zadny Google suggest, zadny DB zapis"
        required: false
        default: "true"
      abort:
        description: "true = okamzity exit bez crawlu"
        required: false
        default: "false"

jobs:
  pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
      PROXY_URL:      ${{ secrets.PROXY_URL }}
      DRY_RUN:        ${{ inputs.dry_run }}
      V3_PILOT_ABORT: ${{ inputs.abort }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run v3 Pilot Crawl
        run: python scripts/v3_pilot_crawl.py

      # Artifact neobsahuje zadne credentials.
      # Obsahuje: summary JSON (dry_run) nebo JSON + MD report (ostry beh).
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v3-pilot-${{ github.run_id }}
          path: |
            v3_pilot_summary.json
            v3-pilot-vs-v2.md
          if-no-files-found: warn
