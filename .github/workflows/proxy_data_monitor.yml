name: Proxy Data Monitor

on:
  # schedule VYPNUT — Telegram aviza vypnuta (Honzík, 2026-07-21).
  # Pro obnoveni odkomentuj schedule/cron nize.
  # schedule:
  #   - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUGGEST_VERIFY_TOKEN: ${{ secrets.SUGGEST_VERIFY_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run proxy data monitor
        run: python proxy_data_monitor.py
