name: Crawler Watchdog

on:
  schedule:
    # Každou hodinu — supervisor freshness práh 300 s, engine práh 6 h.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_threshold:
        description: 'QA: přepíše SUPERVISOR_STALE_SECONDS pro tento run (prázdné = default 300 s)'
        required: false
        default: ''

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STALE_HOURS: '6'
      # §2c: supervisor freshness via suggest-proxy Bearer (read-only HTTP, bez SSH).
      # SUGGEST_VERIFY_TOKEN je Bearer token z vaultu (stejný jako SUGGEST_PROXY_TOKEN na proxy).
      SUGGEST_PROXY_URL: 'https://suggest.good-inventions.work'
      SUGGEST_PROXY_TOKEN: ${{ secrets.SUGGEST_VERIFY_TOKEN }}
      # force_threshold: prázdné = cron default 300 s; vyplněné = QA override (workflow_dispatch only).
      SUPERVISOR_STALE_SECONDS: ${{ inputs.force_threshold || '300' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check crawler health
        run: python watchdog.py
