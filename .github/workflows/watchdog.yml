name: Crawler Watchdog

on:
  # schedule:
  #   - cron: '0 * * * *'
  # Vypnuto 2026-06-08 — watchdog hlídá staré crony (Google v2 crawler),
  # ten byl trvale zastaven. Watchdog nezná stop_flag → falešné alerty.
  # Vzkříšení: odkomentovat až watchdog umí rozlišit záměrně vypnutý engine.
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      STALE_HOURS: '6'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check crawler health
        run: python watchdog.py
