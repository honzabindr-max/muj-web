name: Crawler Watchdog

on:
  # schedule VYPNUT — Telegram aviza vypnuta (Honzík, 2026-07-21).
  # Pro obnoveni odkomentuj schedule/cron nize.
  # schedule:
  #   # Každou hodinu — supervisor práh 300 s, growth práh 1800 s.
  #   - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_threshold:
        description: 'QA: přepíše SUPERVISOR_STALE_SECONDS pro tento run (prázdné = default 300 s)'
        required: false
        default: ''

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # §2c: oba checky přes suggest-proxy Bearer — bez Supabase, bez SSH.
      SUGGEST_PROXY_URL: 'https://suggest.good-inventions.work'
      SUGGEST_PROXY_TOKEN: ${{ secrets.SUGGEST_VERIFY_TOKEN }}
      SUPERVISOR_STALE_SECONDS: ${{ inputs.force_threshold || '300' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check crawler health
        run: python watchdog.py
