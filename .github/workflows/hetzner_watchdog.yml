name: Hetzner Watchdog
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}
jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Hetzner watchdog
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUGGEST_VERIFY_TOKEN: ${{ secrets.SUGGEST_VERIFY_TOKEN }}
        run: python hetzner_watchdog.py
