# config/google_markets.yml
# Konfigurace Google autocomplete marketů (gl + hl kombinace).
#
# Market = kombinace gl + hl — jedna země může mít více jazyků
# (Kanada: ca/en + ca/fr; Švýcarsko: ch/de + ch/fr + ch/it).
#
# Fáze 1: enabled jen cz/cs (validační market).
# Další markety se povolují postupně dle rollout plánu.

defaults:
  max_depth: 1
  max_runtime_minutes: 25
  delay_between_requests_ms: 500
  batch_size: 250

markets:
  # ── Validační market (fáze 2) ──────────────────────────
  - gl: cz
    hl: cs
    enabled: true
    notes: "validační market fáze 1"

  # ── Existující Google data (fáze 3+) ──────────────────
  - gl: de
    hl: de
    enabled: false
    notes: "Německo"

  - gl: at
    hl: de
    enabled: false
    notes: "Rakousko"

  # ── Anglicky mluvící trhy ──────────────────────────────
