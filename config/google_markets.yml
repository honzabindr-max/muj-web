# config/google_markets.yml
# Vygenerováno z google_autocomplete_countries.xlsx (234 zemí, zdroj pravdy).
# Vyřazeno 6 neúzemních/neobydlených kódů: ac, an, bv, cat, io, pn.
# Duplicitní skupiny (Google po 15.4.2025 přesměrovává ccTLD → google.com):
#   A (google.com+en, →us/en): 14 disabled | B (google.com+fr, →mc/fr): 8
#   C (google.com+ar, →sy/ar): 5 | D (google.bs+en, →bs/en): 1
#   E (google.com.hk): cn/zh-CN + hk/zh-TW = různý jazyk → OBĚ enabled
# Vícejazyčné (víc hl): be(fr,nl), ca(en,fr), ch(de,fr,it)
# Celkem 232 entries: 204 enabled, 28 disabled.

defaults:
  max_depth: 1
  batch_size: 250
  max_runtime_minutes: 25
  delay_between_requests_ms: 500

